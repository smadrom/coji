name: Bug report
description: Report reproducible behavior that appears to be incorrect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Remove secrets, personal data, and private deployment details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps or repository.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Version or commit
      placeholder: v0.x.y or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Bun version, browser, provider selections
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, tokens, personal data, and customer media.
          required: true
        - label: This is not a security vulnerability.
          required: true
