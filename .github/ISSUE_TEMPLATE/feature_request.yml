name: Feature request
description: Propose a focused improvement to coji.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
  - type: checkboxes
    id: provider
    attributes:
      label: Provider impact
      options:
        - label: This proposal adds or changes an external provider integration.
        - label: A free Noop or local test path is included in the proposal.
