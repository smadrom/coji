# nginx config for the @coji/web static image.
#
# - Serves the Vite SPA bundle with history-API fallback (deep links → index.html).
# - Proxies /api and /health to the api service so the browser can use a
#   same-origin API URL (VITE_API_URL=/api). The `api` host resolves on the
#   docker-compose network. Runtime API secrets stay in the api container.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted assets; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # API + health pass-through to the api service (compose DNS name `api`).
  location /api/ {
    proxy_pass http://api:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://api:3001/health;
  }

  # Signed file URLs for <img src> (local-fs StorageProvider). signFileUrl()
  # mints relative `/files?key&exp&sig`; the api serves it on the `/files` route
  # (no /api prefix, no Bearer — the HMAC sig authorizes). Without this, /files
  # falls through to the SPA fallback and returns index.html → broken images.
  # proxy_pass WITHOUT a URI part preserves the original `/files?...` path.
  location /files {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
