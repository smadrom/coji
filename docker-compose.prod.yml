# Production compose — api + web + postgres + a one-shot migrate gate.
#
# Startup ordering (the key correctness property):
#   db (healthy) ──► migrate (runs `bun run db:migrate`, exits 0)
#                       └──► api (starts only after migrate completed_successfully)
#   web depends on api being healthy.
#
# Secrets are REQUIRED — the `${VAR:?message}` form makes `docker compose up`
# fail fast when auth, database, or Stripe configuration is incomplete.
# Runtime secrets are api-only; the web image only ever sees the public
# build-time VITE_API_URL.
#
# Usage: populate a gitignored .env, then run
#   docker compose --env-file .env -f docker-compose.prod.yml up -d --build
# See docs/docker.md for required variables and validation.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}
      POSTGRES_DB: ${POSTGRES_DB:-coji}
    volumes:
      - coji-pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-coji} -d ${POSTGRES_DB:-coji}']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations, then exit. The api waits for this to succeed.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-coji}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}@db:5432/${POSTGRES_DB:-coji}
    command: ['bun', 'run', 'db:migrate']
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-coji}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}@db:5432/${POSTGRES_DB:-coji}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required in prod}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL must be the public web origin}
      AUTH_TEST_HEADER: 'false'
      RUNNER_ENABLED: ${RUNNER_ENABLED:-true}
      RUNNER_TICK_MS: ${RUNNER_TICK_MS:-1000}
      # Provider selection — default to the free fakes; override per deployment.
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-noop}
      ANIMATION_PROVIDER: ${ANIMATION_PROVIDER:-noop}
      RENDER_PROVIDER: ${RENDER_PROVIDER:-noop}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local-fs}
      STORAGE_LOCAL_DIR: /data/storage
      # Provider secrets (blank unless the real providers are selected).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://coji.example.com}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-coji}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      HEYGEN_WEBHOOK_SECRET: ${HEYGEN_WEBHOOK_SECRET:-}
      HEYGEN_RESOLUTION: ${HEYGEN_RESOLUTION:-720p}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      # Production currently supports Stripe; Noop payments are rejected by design.
      PAYMENTS_PROVIDER: stripe
      STRIPE_API_KEY: ${STRIPE_API_KEY:?STRIPE_API_KEY is required in prod}
      PAYMENTS_WEBHOOK_SECRET: ${PAYMENTS_WEBHOOK_SECRET:?PAYMENTS_WEBHOOK_SECRET is required in prod}
      PAYMENTS_SUCCESS_URL: ${PAYMENTS_SUCCESS_URL:?PAYMENTS_SUCCESS_URL is required in prod}
      PAYMENTS_CANCEL_URL: ${PAYMENTS_CANCEL_URL:?PAYMENTS_CANCEL_URL is required in prod}
    volumes:
      - coji-storage-prod:/data/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - '${API_PORT:-3001}:3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Public, build-time only. Same-origin /api is proxied by nginx → api.
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  coji-pgdata-prod:
  coji-storage-prod:
